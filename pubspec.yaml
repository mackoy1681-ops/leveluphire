name: leveluphire
description: LevelUpHire - Practice interviews, assessments, and build your resume.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Supabase
  supabase_flutter: ^2.5.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # HTTP for Gemini API
  http: ^1.2.1

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.13.1

  # Image picker (avatar)
  image_picker: ^1.2.2

  # Cached network image
  cached_network_image: ^3.3.1

  # URL launcher
  url_launcher: ^6.3.0

  # Env variables
  flutter_dotenv: ^5.1.0

  # UUID
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

  # Path provider
  path_provider: ^2.1.3

  # Shared preferences
  shared_preferences: ^2.2.0

  # Icons
  cupertino_icons: ^1.0.8
  reorderables: ^0.6.0
  
  # Interview features
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  audioplayers: ^6.6.0
  
  # Kokoro TTS (on-device, free)
  kokoro_tts_flutter: ^0.2.1-exp

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sound/
    - assets/interviewer/
    - assets/kokoro-v1.0.onnx
    - assets/.env

  # fonts: []